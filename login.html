<!DOCTYPE html> 
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="./assets/css/styles.css"> <!-- Global styles -->
        <link rel="stylesheet" href="./assets/css/forms.css">  <!-- Form-specific styles -->
    </head>
    
<body>

    <header>
        <div class="logo">KCT Sports Hub</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="signup.html" class="signup">Sign Up</a>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-container">
            <form class="form" action="login.php" method="POST">
                <h2 class="form-title">Login</h2>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="role" class="form-label">Role</label>
                    <select id="role" name="role" class="form-select" required>
                        <option value="">Select your role</option>
                        <option value="organizer">Organizer</option>
                        <option value="match Official">Match Official</option>
                        <option value="player">Player</option>
                        <option value="viewer">Viewer</option>
                    </select>
                </div>

                <button type="submit" class="form-button">Login</button>

                <p class="signup-link">New here? <a href="signup.html">Sign up now</a></p>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 KCT Sports Nexus. All rights reserved.</p>
    </footer>

</body>
</html>
