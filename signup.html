<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./assets/css/styles.css"> <!-- Global styles -->
    <link rel="stylesheet" href="./assets/css/forms.css">  <!-- Form-specific styles -->
</head>

<body>

    <header>
        <div class="logo">KCT Sports Hub</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" class="login">Login</a>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-container">
            <form class="form" action="signup.php" method="POST">
                <h2 class="form-title">Sign Up</h2>

                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="role" class="form-label">Role</label>
                    <select id="role" name="role" class="form-select" required>
                        <option value="">Select your role</option>
                        <option value="organizer">Organizer</option>
                        <option value="match Official">Match Official</option>
                        <option value="player">Player</option>
                        <option value="viewer">Viewer</option>
                    </select>
                </div>

                <button type="submit" class="form-button">Sign Up</button>

                <p class="login-link">Already have an account? <a href="login.html" class="login-link-text">Login here</a></p>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 KCT Sports Nexus. All rights reserved.</p>
    </footer>

</body>
</html>
